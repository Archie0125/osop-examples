osop_version: "1.0"
id: "osop-the-loop"
name: "The Loop：自我優化工作流程"
description: "執行 .osop → 記錄 .osoplog → AI 合成更好的 .osop → diff 驗證 → 重複。每個循環更快、更便宜、更可靠。"
tags: [osop, the-loop, meta, optimize]

nodes:
  - id: "execute"
    type: "cli"
    name: "osop run"
    description: "執行工作流程。Agent 節點呼叫真實 LLM。API 節點發送真實 HTTP 請求。CLI 節點執行命令。Human 節點等待核准。"
    runtime:
      command: "osop run workflow.osop.yaml --allow-exec --log"

  - id: "record"
    type: "system"
    name: "產生 .osoplog"
    description: "自動產生執行記錄。每個節點：時間戳記、持續時間、成本、使用工具、AI 模型、Token 數、人工決策、錯誤。"

  - id: "synthesize"
    type: "agent"
    subtype: "llm"
    name: "osop synthesize"
    description: "將多個 .osoplog 檔案餵給 AI。它讀取每個步驟、每個持續時間、每個失敗。撰寫最佳化的 .osop。慢步驟平行化。失敗已處理。"
    runtime:
      provider: "anthropic"
      model: "claude-sonnet-4-6"

  - id: "diff"
    type: "cli"
    name: "osop diff"
    description: "比較舊的 .osop 與新的。查看變更內容：新增的節點、移除的邊、重組的流程。然後比較執行日誌：每步持續時間、成本、狀態差異。"
    runtime:
      command: "osop diff old.osop.yaml new.osop.yaml"

  - id: "review"
    type: "human"
    subtype: "review"
    name: "人工審查最佳化"
    description: "審查 AI 建議的變更。接受、修改或拒絕。由人決定。AI 提供建議。"
    security:
      approval_gate: true

  - id: "apply"
    type: "mcp"
    name: "套用最佳化的 .osop"
    description: "最佳化的 .osop 成為新的基準。下次執行使用此版本。循環繼續。"

edges:
  - from: "execute"
    to: "record"
    mode: "sequential"
  - from: "record"
    to: "synthesize"
    mode: "sequential"
  - from: "synthesize"
    to: "diff"
    mode: "sequential"
  - from: "diff"
    to: "review"
    mode: "sequential"
  - from: "review"
    to: "apply"
    mode: "sequential"
  - from: "apply"
    to: "execute"
    mode: "loop"
    label: "下一個循環"
