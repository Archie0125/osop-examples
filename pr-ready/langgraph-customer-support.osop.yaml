# LangGraph Customer Support Bot — OSOP Workflow
#
# Intent-based routing: classify user message, route to specialist agent,
# generate response, escalate to human when confidence is low.
#
# Validate: osop validate --schema core langgraph-customer-support.osop.yaml

osop_version: "1.0"
id: "langgraph-customer-support"
name: "Customer Support Bot"
description: "Intent-based routing with specialist agents and human escalation."
tags: [langgraph, chatbot, support, routing]

nodes:
  - id: "receive_message"
    type: "api"
    subtype: "webhook"
    name: "Receive Customer Message"
    runtime:
      method: "POST"
      url: "/api/messages"

  - id: "classify_intent"
    type: "agent"
    subtype: "llm"
    name: "Classify Intent"
    description: "Determine intent category and confidence score."
    runtime:
      provider: "openai"
      model: "gpt-4o-mini"
      system_prompt: "Classify the customer message into: billing, technical, or general. Return intent and confidence (0-1)."

  - id: "billing_specialist"
    type: "agent"
    subtype: "llm"
    name: "Billing Specialist"
    description: "Handles refunds, invoices, plan changes."
    runtime:
      provider: "openai"
      model: "gpt-4o"
      tools: ["lookup_subscription", "issue_refund"]

  - id: "technical_specialist"
    type: "agent"
    subtype: "llm"
    name: "Technical Specialist"
    description: "Handles bug reports, API questions, integration help."
    runtime:
      provider: "openai"
      model: "gpt-4o"
      tools: ["search_docs", "check_status_page"]

  - id: "general_agent"
    type: "agent"
    subtype: "llm"
    name: "General Agent"
    description: "Handles FAQs and general inquiries."
    runtime:
      provider: "openai"
      model: "gpt-4o-mini"

  - id: "generate_response"
    type: "agent"
    subtype: "llm"
    name: "Format Response"
    description: "Polish the specialist output into a friendly message."
    runtime:
      provider: "openai"
      model: "gpt-4o-mini"

  - id: "human_escalation"
    type: "human"
    subtype: "review"
    name: "Human Agent Takeover"
    description: "Route to a live agent when confidence is below threshold."

edges:
  - from: "receive_message"
    to: "classify_intent"
  - from: "classify_intent"
    to: "billing_specialist"
    mode: "conditional"
    when: "outputs.classify_intent.intent == 'billing'"
  - from: "classify_intent"
    to: "technical_specialist"
    mode: "conditional"
    when: "outputs.classify_intent.intent == 'technical'"
  - from: "classify_intent"
    to: "general_agent"
    mode: "conditional"
    when: "outputs.classify_intent.intent == 'general'"
  - from: "classify_intent"
    to: "human_escalation"
    mode: "conditional"
    when: "outputs.classify_intent.confidence < 0.6"
    label: "Low confidence — escalate"
  - from: "billing_specialist"
    to: "generate_response"
  - from: "technical_specialist"
    to: "generate_response"
  - from: "general_agent"
    to: "generate_response"
