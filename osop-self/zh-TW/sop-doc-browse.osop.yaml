osop_version: "1.0"
id: "osop-sop-doc-browse"
name: "SOP Doc：瀏覽並理解任何工作流程"
description: "SOP Doc 的運作方式。撰寫 .osop 檔案，以視覺化方式瀏覽，與任何人分享。非工程人員可閱讀 Visual 分頁。"
tags: [osop, sop-doc, meta, browse]

nodes:
  - id: "write_osop"
    type: "human"
    name: "撰寫 .osop 檔案"
    description: "將流程定義為 YAML。每個步驟是一個節點（api、agent、human、cli、cicd）。連線是邊（sequential、conditional、fallback、loop）。"

  - id: "validate"
    type: "cli"
    name: "osop validate"
    description: "根據 JSON Schema 檢查 .osop 檔案。在任何人看到之前捕捉錯誤。"
    runtime:
      command: "osop validate workflow.osop.yaml"

  - id: "visual_browse"
    type: "mcp"
    name: "在 SOP Doc 中瀏覽"
    description: "開啟 osop.ai/sop-doc。每個工作流程顯示兩個分頁：Visual（帶有彩色節點圓點的流程圖）和 .osop（完整 YAML）。可搜尋，可依來源篩選。"

  - id: "open_editor"
    type: "mcp"
    name: "在視覺編輯器中開啟"
    description: "點擊「在編輯器中開啟」查看互動式節點圖。拖曳節點。5 種檢視模式：graph、story、role、agent、code。內建風險分析。"

  - id: "share"
    type: "human"
    name: "與團隊分享"
    description: "複製 YAML 或傳送編輯器連結。PM 閱讀 Visual 分頁。工程師閱讀 YAML。每個人看到相同的流程。"

edges:
  - from: "write_osop"
    to: "validate"
    mode: "sequential"
  - from: "validate"
    to: "visual_browse"
    mode: "sequential"
  - from: "visual_browse"
    to: "open_editor"
    mode: "sequential"
  - from: "open_editor"
    to: "share"
    mode: "sequential"
  - from: "validate"
    to: "write_osop"
    mode: "fallback"
