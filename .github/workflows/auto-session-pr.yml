name: Auto-create PR for Session Logs

on:
  push:
    paths:
      - 'sessions/**'
      - 'claude-code-session/**'
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  create-session-pr:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for new session files
        id: check
        run: |
          FILES=$(git diff --name-only HEAD~1 HEAD -- 'sessions/' 'claude-code-session/' 2>/dev/null || echo "")
          if [ -z "$FILES" ]; then
            echo "has_sessions=false" >> $GITHUB_OUTPUT
          else
            echo "has_sessions=true" >> $GITHUB_OUTPUT
            echo "files<<EOF" >> $GITHUB_OUTPUT
            echo "$FILES" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          fi

      - name: Create Pull Request
        if: steps.check.outputs.has_sessions == 'true'
        id: cpr
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.BOT_TOKEN || secrets.GITHUB_TOKEN }}
          commit-message: 'Add OSOP session logs'
          title: 'session: new execution logs from Claude Code'
          body: |
            ## New OSOP Session Logs

            Automated session logging from Claude Code / Cowork.

            ### Files
            ${{ steps.check.outputs.files }}

            ---
            View these logs at [osop-editor.vercel.app](https://osop-editor.vercel.app)

            🤖 Generated by OSOP auto-logging
          branch: sessions-${{ github.run_number }}
          delete-branch: true
          labels: automated,session-log

      - name: Auto-approve PR
        if: steps.cpr.outputs.pull-request-number
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.BOT_TOKEN || secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.pulls.createReview({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: ${{ steps.cpr.outputs.pull-request-number }},
              event: 'APPROVE',
              body: 'LGTM — automated session log verified.'
            });

      - name: Auto-merge PR
        if: steps.cpr.outputs.pull-request-number
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.BOT_TOKEN || secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.pulls.merge({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: ${{ steps.cpr.outputs.pull-request-number }},
              merge_method: 'squash'
            });
