# CrewAI Research Pipeline — OSOP Workflow
#
# Three-agent research crew: Researcher gathers sources, Analyst extracts
# insights, Writer produces a polished report.
#
# Validate: osop validate --schema core crewai-research-pipeline.osop.yaml

osop_version: "1.0"
id: "crewai-research-pipeline"
name: "Research Pipeline Crew"
description: "Three-agent crew that researches a topic, analyzes findings, and writes a report."
tags: [crewai, multi-agent, research]

nodes:
  - id: "user_topic"
    type: "human"
    name: "Provide Research Topic"
    description: "User supplies a topic and desired depth."

  - id: "researcher"
    type: "agent"
    subtype: "llm"
    name: "Researcher Agent"
    description: "Searches the web and collects raw source material."
    runtime:
      provider: "openai"
      model: "gpt-4o"
      system_prompt: "You are a Senior Research Analyst. Search thoroughly and collect diverse sources."
      tools: ["web_search", "arxiv_search", "url_reader"]

  - id: "analyst"
    type: "agent"
    subtype: "llm"
    name: "Analyst Agent"
    description: "Synthesizes raw sources into structured insights."
    runtime:
      provider: "openai"
      model: "gpt-4o"
      system_prompt: "Analyze the research and extract key findings, trends, and contradictions."

  - id: "writer"
    type: "agent"
    subtype: "llm"
    name: "Writer Agent"
    description: "Produces a polished markdown report with citations."
    runtime:
      provider: "openai"
      model: "gpt-4o"
      system_prompt: "Write a clear, well-structured report with inline citations."

  - id: "human_review"
    type: "human"
    subtype: "review"
    name: "Review Report"
    description: "User reviews the final report and requests revisions if needed."

edges:
  - from: "user_topic"
    to: "researcher"
  - from: "researcher"
    to: "analyst"
  - from: "analyst"
    to: "writer"
  - from: "writer"
    to: "human_review"
  - from: "human_review"
    to: "writer"
    mode: "conditional"
    when: "outputs.human_review.revision_requested == true"
    label: "Revisions needed"
