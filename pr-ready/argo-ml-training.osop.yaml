# Argo Workflows ML Training Pipeline — OSOP Workflow
#
# End-to-end ML: prepare data, train on GPU, evaluate against baseline,
# A/B test on shadow traffic, deploy if the new model wins.
#
# Validate: osop validate --schema core argo-ml-training.osop.yaml

osop_version: "1.0"
id: "argo-ml-training"
name: "ML Training Pipeline"
description: "Data prep → train → evaluate → A/B test → deploy to serving endpoint."
tags: [argo, mlops, training, ml-pipeline]

nodes:
  - id: "prepare_data"
    type: "cli"
    subtype: "script"
    name: "Prepare Training Data"
    description: "Pull from feature store, split train/val/test."
    runtime:
      command: "python scripts/prepare_data.py --source feature-store://user-embeddings/v3"

  - id: "train_model"
    type: "cli"
    subtype: "script"
    name: "Train Model"
    description: "Fine-tune transformer model on GPU nodes."
    runtime:
      command: "python train.py --config config/prod.yaml"
    timeout_sec: 7200

  - id: "evaluate"
    type: "cli"
    subtype: "test"
    name: "Evaluate Model"
    description: "Compare accuracy, latency, and fairness metrics against baseline."
    runtime:
      command: "python evaluate.py --baseline models/production/latest"

  - id: "ab_test"
    type: "cli"
    subtype: "script"
    name: "A/B Test on Shadow Traffic"
    description: "Route 10% of shadow traffic to candidate model for 24 hours."
    runtime:
      command: "python scripts/ab_test.py --traffic-split 0.1 --duration 24h"

  - id: "deploy_serving"
    type: "cli"
    subtype: "script"
    name: "Deploy to Serving"
    description: "Promote candidate to production serving endpoint."
    runtime:
      command: "kubectl apply -f k8s/model-serving.yaml"

  - id: "rollback"
    type: "cli"
    subtype: "script"
    name: "Rollback"
    description: "Revert to previous model version."
    runtime:
      command: "kubectl rollout undo deployment/model-serving"

edges:
  - from: "prepare_data"
    to: "train_model"
  - from: "train_model"
    to: "evaluate"
  - from: "evaluate"
    to: "ab_test"
    mode: "conditional"
    when: "outputs.evaluate.accuracy > outputs.evaluate.baseline_accuracy"
    label: "Beats baseline"
  - from: "ab_test"
    to: "deploy_serving"
    mode: "conditional"
    when: "outputs.ab_test.result == 'winner'"
    label: "A/B test passed"
  - from: "ab_test"
    to: "rollback"
    mode: "fallback"
    label: "A/B test failed"
  - from: "evaluate"
    to: "rollback"
    mode: "fallback"
    label: "Below baseline"
