# AutoGen Multi-Agent Debate — OSOP Workflow
#
# A structured debate between AI agents: a moderator poses a question,
# pro and con agents argue in parallel, the moderator synthesizes both
# sides, and a human judge delivers the final verdict.
#
# Validate: osop validate --schema core autogen-debate.osop.yaml
# Visual:   https://osop-editor.vercel.app (drag and drop this file)

osop_version: "1.0"
id: "autogen-debate"
name: "Multi-Agent Debate"
description: "Structured debate with pro/con agents, moderator synthesis, and human judgment."
tags: [autogen, multi-agent, debate, reasoning]

nodes:
  - id: "pose_question"
    type: "human"
    subtype: "input"
    name: "Pose Debate Question"
    description: "User provides the debate topic and any constraints."

  - id: "moderator_open"
    type: "agent"
    subtype: "llm"
    name: "Moderator — Opening"
    description: "Frames the question, defines scope, and sets debate rules."
    runtime:
      provider: "openai"
      model: "gpt-4o"
      system_prompt: "You are a neutral debate moderator. Frame the question clearly and set ground rules."

  - id: "pro_agent"
    type: "agent"
    subtype: "llm"
    name: "Pro Agent"
    description: "Argues in favor of the proposition with evidence and reasoning."
    runtime:
      provider: "openai"
      model: "gpt-4o"
      system_prompt: "Argue in favor of the proposition. Use evidence and clear reasoning."
      tools: ["web_search", "cite_source"]

  - id: "con_agent"
    type: "agent"
    subtype: "llm"
    name: "Con Agent"
    description: "Argues against the proposition with counterevidence."
    runtime:
      provider: "openai"
      model: "gpt-4o"
      system_prompt: "Argue against the proposition. Use counterevidence and clear reasoning."
      tools: ["web_search", "cite_source"]

  - id: "moderator_synthesize"
    type: "agent"
    subtype: "llm"
    name: "Moderator — Synthesis"
    description: "Summarizes both sides, highlights strongest arguments and gaps."
    runtime:
      provider: "openai"
      model: "gpt-4o"
      system_prompt: "Synthesize both arguments. Highlight the strongest points and remaining gaps."

  - id: "human_judge"
    type: "human"
    subtype: "review"
    name: "Human Judge"
    description: "Reviews the debate and declares a winner or draw."

edges:
  - from: "pose_question"
    to: "moderator_open"
  - from: "moderator_open"
    to: "pro_agent"
    mode: "parallel"
  - from: "moderator_open"
    to: "con_agent"
    mode: "parallel"
  - from: "pro_agent"
    to: "moderator_synthesize"
  - from: "con_agent"
    to: "moderator_synthesize"
  - from: "moderator_synthesize"
    to: "human_judge"
