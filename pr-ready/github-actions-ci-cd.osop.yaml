# GitHub Actions CI/CD — OSOP Workflow
#
# Full pipeline: lint, parallel tests, Docker build, staging deploy,
# manual approval, production deploy.
#
# Validate: osop validate --schema core github-actions-ci-cd.osop.yaml

osop_version: "1.0"
id: "github-actions-ci-cd"
name: "CI/CD Pipeline"
description: "Lint → parallel tests → Docker build → staging → approval → production."
tags: [github-actions, cicd, docker, deployment]

nodes:
  - id: "lint"
    type: "cli"
    subtype: "test"
    name: "Lint & Type Check"
    runtime:
      command: "npx eslint . && npx tsc --noEmit"

  - id: "unit_tests"
    type: "cli"
    subtype: "test"
    name: "Unit Tests"
    runtime:
      command: "npx jest --coverage --ci"

  - id: "integration_tests"
    type: "cli"
    subtype: "test"
    name: "Integration Tests"
    runtime:
      command: "npx playwright test"

  - id: "build_docker"
    type: "cli"
    subtype: "script"
    name: "Build Docker Image"
    description: "Build and push multi-arch image to GHCR."
    runtime:
      command: "docker buildx build --platform linux/amd64,linux/arm64 -t ghcr.io/org/app:latest --push ."

  - id: "deploy_staging"
    type: "cli"
    subtype: "script"
    name: "Deploy to Staging"
    runtime:
      command: "kubectl apply -f k8s/staging/"

  - id: "approval_gate"
    type: "human"
    subtype: "review"
    name: "Production Approval"
    description: "Team lead reviews staging and approves production deploy."

  - id: "deploy_production"
    type: "cli"
    subtype: "script"
    name: "Deploy to Production"
    runtime:
      command: "kubectl apply -f k8s/production/"

edges:
  - from: "lint"
    to: "unit_tests"
    mode: "parallel"
  - from: "lint"
    to: "integration_tests"
    mode: "parallel"
  - from: "unit_tests"
    to: "build_docker"
  - from: "integration_tests"
    to: "build_docker"
  - from: "build_docker"
    to: "deploy_staging"
  - from: "deploy_staging"
    to: "approval_gate"
  - from: "approval_gate"
    to: "deploy_production"
