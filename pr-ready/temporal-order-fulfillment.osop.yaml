# Temporal Order Fulfillment — OSOP Workflow
#
# Durable order processing: validate, reserve inventory, charge payment,
# ship, confirm. Compensating actions on failure.
#
# Validate: osop validate --schema core temporal-order-fulfillment.osop.yaml

osop_version: "1.0"
id: "temporal-order-fulfillment"
name: "Order Fulfillment Saga"
description: "Durable order processing with compensation on failure."
tags: [temporal, saga, e-commerce]

nodes:
  - id: "validate_order"
    type: "cli"
    subtype: "script"
    name: "Validate Order"
    description: "Check item availability, shipping address, and order limits."
    runtime:
      command: "python scripts/validate_order.py"

  - id: "reserve_inventory"
    type: "api"
    subtype: "rest"
    name: "Reserve Inventory"
    description: "Place a hold on items in warehouse management system."
    runtime:
      method: "POST"
      url: "https://warehouse.internal/api/reserve"
    timeout_sec: 1800

  - id: "charge_payment"
    type: "api"
    subtype: "rest"
    name: "Charge Payment"
    description: "Authorize and capture payment via Stripe."
    runtime:
      method: "POST"
      url: "https://api.stripe.com/v1/charges"
    retry_policy:
      max_retries: 3
      strategy: "exponential_backoff"

  - id: "ship_order"
    type: "api"
    subtype: "rest"
    name: "Create Shipment"
    description: "Generate shipping label and schedule carrier pickup."
    runtime:
      method: "POST"
      url: "https://api.shippo.com/shipments"

  - id: "send_confirmation"
    type: "api"
    subtype: "rest"
    name: "Send Confirmation"
    description: "Email order confirmation with tracking number."
    runtime:
      method: "POST"
      url: "https://api.sendgrid.com/v3/mail/send"

  - id: "handle_return"
    type: "human"
    name: "Handle Return Request"
    description: "Customer requests return — triggers reverse logistics."

  - id: "compensation_handler"
    type: "cli"
    subtype: "script"
    name: "Run Compensations"
    description: "Execute compensating transactions in reverse order on failure."
    runtime:
      command: "python scripts/compensate.py --order-id ${inputs.order_id}"

edges:
  - from: "validate_order"
    to: "reserve_inventory"
  - from: "reserve_inventory"
    to: "charge_payment"
  - from: "charge_payment"
    to: "ship_order"
  - from: "ship_order"
    to: "send_confirmation"
  - from: "reserve_inventory"
    to: "compensation_handler"
    mode: "fallback"
    label: "Downstream failure"
  - from: "charge_payment"
    to: "compensation_handler"
    mode: "fallback"
    label: "Payment or shipping failed"
  - from: "ship_order"
    to: "compensation_handler"
    mode: "fallback"
    label: "Shipping failed"
