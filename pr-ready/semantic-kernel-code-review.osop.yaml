# Semantic Kernel Automated Code Review — OSOP Workflow
#
# AI-powered PR review: fetch the diff, analyze complexity and patterns
# in parallel, generate a structured review, post comments on GitHub,
# and request changes if critical issues are found.
#
# Validate: osop validate --schema core semantic-kernel-code-review.osop.yaml
# Visual:   https://osop-editor.vercel.app (drag and drop this file)

osop_version: "1.0"
id: "semantic-kernel-code-review"
name: "Automated Code Review"
description: "Fetch PR diff, parallel analysis (complexity + security + tests), generate review, post comments."
tags: [semantic-kernel, code-review, github, devtools]

nodes:
  - id: "fetch_diff"
    type: "api"
    subtype: "rest"
    name: "Fetch PR Diff"
    description: "Pull the diff and file list from the GitHub PR API."
    runtime:
      method: "GET"
      url: "https://api.github.com/repos/{owner}/{repo}/pulls/{number}/files"
      headers:
        Accept: "application/vnd.github.v3+json"

  - id: "analyze_complexity"
    type: "agent"
    subtype: "llm"
    name: "Analyze Complexity"
    description: "Measure cyclomatic complexity, function length, and nesting depth."
    runtime:
      provider: "openai"
      model: "gpt-4o"
      system_prompt: "Analyze code complexity. Report cyclomatic complexity, function length, and nesting depth for each changed file."

  - id: "check_patterns"
    type: "agent"
    subtype: "llm"
    name: "Check Patterns & Security"
    description: "Scan for anti-patterns, SQL injection, hardcoded secrets, and OWASP issues."
    runtime:
      provider: "openai"
      model: "gpt-4o"
      system_prompt: "Scan code for security issues: SQL injection, hardcoded secrets, XSS, OWASP Top 10. Report each finding with file, line, and severity."

  - id: "check_tests"
    type: "agent"
    subtype: "llm"
    name: "Check Test Coverage"
    description: "Verify new code paths have corresponding test cases."
    runtime:
      provider: "openai"
      model: "gpt-4o"
      system_prompt: "Check if new code paths have test coverage. Flag untested logic."

  - id: "generate_review"
    type: "agent"
    subtype: "llm"
    name: "Generate Review"
    description: "Synthesize all analysis into a structured review with severity levels."
    runtime:
      provider: "openai"
      model: "gpt-4o"
      system_prompt: "Combine complexity, security, and test findings into a structured code review. Output: summary, issues array (file, line, severity, message), and verdict (approve or request_changes)."

  - id: "post_comments"
    type: "api"
    subtype: "rest"
    name: "Post Review Comments"
    description: "Submit inline comments and overall review via GitHub API."
    runtime:
      method: "POST"
      url: "https://api.github.com/repos/{owner}/{repo}/pulls/{number}/reviews"
      headers:
        Accept: "application/vnd.github.v3+json"

  - id: "request_changes"
    type: "api"
    subtype: "rest"
    name: "Request Changes"
    description: "Mark the PR as 'changes requested' when critical issues are found."
    runtime:
      method: "POST"
      url: "https://api.github.com/repos/{owner}/{repo}/pulls/{number}/reviews"

edges:
  - from: "fetch_diff"
    to: "analyze_complexity"
    mode: "parallel"
  - from: "fetch_diff"
    to: "check_patterns"
    mode: "parallel"
  - from: "fetch_diff"
    to: "check_tests"
    mode: "parallel"
  - from: "analyze_complexity"
    to: "generate_review"
  - from: "check_patterns"
    to: "generate_review"
  - from: "check_tests"
    to: "generate_review"
  - from: "generate_review"
    to: "post_comments"
  - from: "generate_review"
    to: "request_changes"
    mode: "conditional"
    when: "outputs.generate_review.verdict == 'request_changes'"
    label: "Critical issues found"
