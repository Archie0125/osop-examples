osop_version: "1.0"
id: "osop-import-existing"
name: "將現有工作流程匯入 SOP Doc"
description: "將 GitHub Actions、Airflow、n8n、CrewAI、Argo 或 LangGraph 工作流程轉換為 .osop 格式。你的現有流程成為 SOP Doc 項目。"
tags: [osop, sop-doc, import, convert, meta]

nodes:
  - id: "identify_source"
    type: "human"
    name: "識別來源格式"
    description: "你的現有工作流程是什麼格式？支援：GitHub Actions YAML、Airflow DAG（Python）、n8n JSON、CrewAI YAML、Argo Workflows YAML、LangGraph Python。"

  - id: "run_import"
    type: "cli"
    name: "osop import"
    description: "轉換為 OSOP 格式。轉換器將來源特定概念（jobs、operators、tasks）對應到 OSOP 節點和邊。"
    runtime:
      command: "osop import .github/workflows/deploy.yml --from github-actions -o deploy.osop.yaml"

  - id: "validate"
    type: "cli"
    name: "osop validate"
    description: "驗證轉換後的檔案是否為有效的 OSOP。"
    runtime:
      command: "osop validate deploy.osop.yaml"

  - id: "review_visual"
    type: "human"
    subtype: "review"
    name: "在視覺編輯器中審查"
    description: "在編輯器中開啟轉換後的 .osop。檢查流程是否與原始工作流程相符。必要時調整。"

  - id: "publish"
    type: "mcp"
    name: "新增至 SOP Doc"
    description: "轉換後的工作流程現在是 .osop 檔案。將它加入你的 SOP Doc 集合。與其他 SOP 一起瀏覽。"

edges:
  - from: "identify_source"
    to: "run_import"
    mode: "sequential"
  - from: "run_import"
    to: "validate"
    mode: "sequential"
  - from: "validate"
    to: "run_import"
    mode: "fallback"
    label: "修正轉換問題"
  - from: "validate"
    to: "review_visual"
    mode: "sequential"
  - from: "review_visual"
    to: "publish"
    mode: "sequential"
