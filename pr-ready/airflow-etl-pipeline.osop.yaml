# Airflow ETL Pipeline — OSOP Workflow
#
# Extract-transform-load: pull data from S3, validate schema, transform
# with dbt, load into warehouse, refresh dashboard, alert on failure.
#
# Validate: osop validate --schema core airflow-etl-pipeline.osop.yaml

osop_version: "1.0"
id: "airflow-etl-pipeline"
name: "Daily ETL Pipeline"
description: "S3 extract → validate → dbt transform → warehouse load → dashboard refresh."
tags: [airflow, etl, data-engineering]

nodes:
  - id: "extract_s3"
    type: "cli"
    subtype: "script"
    name: "Extract from S3"
    description: "Download daily CSV exports from S3 data lake."
    runtime:
      command: "aws s3 sync s3://data-lake/raw/$(date +%Y-%m-%d) /tmp/raw/"

  - id: "validate_schema"
    type: "cli"
    subtype: "test"
    name: "Validate Schema"
    description: "Check column types, nullability, and row count."
    runtime:
      command: "great_expectations checkpoint run raw_data_suite"

  - id: "transform_dbt"
    type: "cli"
    subtype: "script"
    name: "Transform with dbt"
    description: "Run dbt models to clean, deduplicate, and join tables."
    runtime:
      command: "dbt run --select tag:daily"

  - id: "load_warehouse"
    type: "cli"
    subtype: "script"
    name: "Load to Warehouse"
    description: "Insert transformed data into production tables."
    runtime:
      command: "python scripts/load_to_snowflake.py --env prod"

  - id: "refresh_dashboard"
    type: "api"
    subtype: "rest"
    name: "Refresh Dashboard"
    description: "Trigger cache invalidation on the KPI dashboard."
    runtime:
      method: "POST"
      url: "https://metabase.internal/api/card/refresh"

  - id: "notify_failure"
    type: "api"
    subtype: "rest"
    name: "Slack Failure Alert"
    description: "Post to #data-alerts with error details."
    runtime:
      method: "POST"
      url: "https://hooks.slack.com/services/..."

edges:
  - from: "extract_s3"
    to: "validate_schema"
  - from: "validate_schema"
    to: "transform_dbt"
  - from: "transform_dbt"
    to: "load_warehouse"
  - from: "load_warehouse"
    to: "refresh_dashboard"
  - from: "extract_s3"
    to: "notify_failure"
    mode: "fallback"
    label: "Extract failed"
  - from: "validate_schema"
    to: "notify_failure"
    mode: "fallback"
    label: "Validation failed"
  - from: "transform_dbt"
    to: "notify_failure"
    mode: "fallback"
    label: "Transform failed"
