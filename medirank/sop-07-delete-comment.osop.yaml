# 原始：SOP-07: 刪除留言
osop_version: '1.0'
id: sop-07-delete-comment
name: 'SOP-07: Delete a Comment'
description: Delete a comment by ID.
version: 1.0.0
tags:
- api
- sop
- medirank
- comments
nodes:
- id: step_1
  type: api
  subtype: rest
  name: DELETE /comments/{comment_id}
