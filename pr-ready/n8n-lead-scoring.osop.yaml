# n8n Lead Scoring — OSOP Workflow
#
# Automates lead qualification: webhook receives form submissions,
# enriches via Clearbit, AI scores the lead, updates CRM, notifies Sales.
#
# Validate: osop validate --schema core n8n-lead-scoring.osop.yaml

osop_version: "1.0"
id: "n8n-lead-scoring"
name: "Lead Scoring Automation"
description: "Webhook → enrich → AI score → CRM update → route hot/cold leads."
tags: [n8n, sales, automation, crm]

nodes:
  - id: "webhook_trigger"
    type: "api"
    subtype: "webhook"
    name: "Receive Lead Form"
    runtime:
      method: "POST"
      url: "/leads/inbound"

  - id: "enrich_company"
    type: "api"
    subtype: "rest"
    name: "Enrich via Clearbit"
    description: "Fetch company size, industry, and funding."
    runtime:
      method: "GET"
      url: "https://company.clearbit.com/v2/companies/find"

  - id: "score_lead"
    type: "agent"
    subtype: "llm"
    name: "AI Lead Scoring"
    description: "Evaluate enriched data and assign a 0-100 score."
    runtime:
      provider: "openai"
      model: "gpt-4o-mini"
      temperature: 0.2
      system_prompt: "Score this lead 0-100 based on company size, industry fit, and funding stage. Explain your reasoning."

  - id: "update_crm"
    type: "api"
    subtype: "rest"
    name: "Update HubSpot"
    description: "Push score and enrichment to HubSpot contact record."
    runtime:
      method: "PATCH"
      url: "https://api.hubapi.com/crm/v3/objects/contacts"

  - id: "notify_sales"
    type: "api"
    subtype: "rest"
    name: "Slack — Hot Lead"
    description: "Notify #sales-leads for high-scoring leads."
    runtime:
      method: "POST"
      url: "https://hooks.slack.com/services/..."

  - id: "log_cold_lead"
    type: "api"
    subtype: "rest"
    name: "Archive Cold Lead"
    description: "Add low-score leads to nurture queue."
    runtime:
      method: "POST"
      url: "https://api.hubapi.com/crm/v3/objects/contacts/nurture"

edges:
  - from: "webhook_trigger"
    to: "enrich_company"
  - from: "enrich_company"
    to: "score_lead"
  - from: "score_lead"
    to: "update_crm"
  - from: "update_crm"
    to: "notify_sales"
    mode: "conditional"
    when: "outputs.score_lead.score >= 70"
    label: "Hot lead"
  - from: "update_crm"
    to: "log_cold_lead"
    mode: "conditional"
    when: "outputs.score_lead.score < 70"
    label: "Cold lead — nurture"
