# Dify RAG Chatbot — OSOP Workflow
#
# Retrieval-augmented generation: receive question, retrieve from vector store,
# rerank, generate cited answer, collect feedback.
#
# Validate: osop validate --schema core dify-rag-chatbot.osop.yaml

osop_version: "1.0"
id: "dify-rag-chatbot"
name: "RAG Chatbot Pipeline"
description: "Question → retrieve → rerank → generate answer with citations → feedback."
tags: [dify, rag, chatbot, vector-search]

nodes:
  - id: "receive_question"
    type: "api"
    subtype: "webhook"
    name: "Receive Question"
    description: "User submits a question via chat interface or API."
    runtime:
      method: "POST"
      url: "/api/chat"

  - id: "retrieve_docs"
    type: "api"
    subtype: "rest"
    name: "Vector Retrieval"
    description: "Embed query and retrieve top-k chunks from vector store."
    runtime:
      method: "POST"
      url: "https://api.pinecone.io/query"

  - id: "rerank"
    type: "agent"
    subtype: "llm"
    name: "Rerank Results"
    description: "Cross-encoder reranking to select most relevant chunks."
    runtime:
      provider: "cohere"
      model: "rerank-v3"

  - id: "generate_answer"
    type: "agent"
    subtype: "llm"
    name: "Generate Answer"
    description: "Produce a grounded answer with inline citations."
    runtime:
      provider: "openai"
      model: "gpt-4o"
      temperature: 0.3
      system_prompt: "Answer using ONLY the provided context. Cite sources as [1], [2], etc."

  - id: "format_citations"
    type: "cli"
    subtype: "script"
    name: "Format Citations"
    description: "Map citation markers to source document metadata."
    runtime:
      command: "python scripts/format_citations.py"

  - id: "collect_feedback"
    type: "human"
    name: "User Feedback"
    description: "Thumbs up/down for answer quality tracking."

edges:
  - from: "receive_question"
    to: "retrieve_docs"
  - from: "retrieve_docs"
    to: "rerank"
  - from: "rerank"
    to: "generate_answer"
  - from: "generate_answer"
    to: "format_citations"
  - from: "format_citations"
    to: "collect_feedback"
